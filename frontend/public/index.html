<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#003366" />
    <meta name="description" content="Student result management system for Bonde Secondary School" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Bonde Results" />
    <link rel="icon" type="image/png" href="/asset/bonde.png" />
    <link rel="apple-touch-icon" href="/asset/bonde.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>BONDE SEC SCHOOL - Result System</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { max-width: 100%; overflow-x: hidden; }
      body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #e8edf5; }
      #root { height: 100vh; display: flex; flex-direction: column; min-width: 0; overflow-x: hidden; }

      @media print {
        .no-print { display: none !important; }
        body { background: white; }
        #root { height: auto; }
      }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #f0f4ff; }
      ::-webkit-scrollbar-thumb { background: #b0c4e8; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #7a9fd0; }

      @media (max-width: 720px) {
        button { min-height: 36px; }
        input, select, textarea { min-height: 36px; font-size: 16px !important; }
      }

      input:focus, select:focus, textarea:focus {
        outline: 2px solid #4a90e2 !important;
        outline-offset: 1px;
      }

      input[type=number]::-webkit-inner-spin-button,
      input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
      input[type=number] { -moz-appearance: textfield; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
